<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Hack4Gov</title>
  <link rel="icon" type="png/x-icon" href="{{ url_for('static', filename='logo.png')}}">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Rajdhani', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(#8B1A1A 1px, transparent 1px),
        linear-gradient(90deg, #8B1A1A 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.05;
      pointer-events: none;
    }

    .card {
      background: #111;
      border: 1px solid #2a0a0a;
      border-top: 3px solid #8B1A1A;
      border-radius: 4px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      position: relative;
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
    }
    .card::before { bottom: -1px; right: -1px; border-bottom: 2px solid #8B1A1A; border-right: 2px solid #8B1A1A; }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #fff;
    }

    .logo-title span { color: #8B1A1A; }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #555;
      margin-top: 4px;
    }

    label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a0a0a;
      border-left: 3px solid #8B1A1A;
      color: #f0f0f0;
      padding: 10px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      border-radius: 2px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #c0392b;
      border-left-color: #ff4444;
      background: #0f0505;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #8B1A1A;
      border: none;
      border-bottom: 3px solid #5a0f0f;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #a52020; }
    button[type="submit"]:active { transform: translateY(2px); border-bottom-width: 1px; }

    /* Flash messages from Flask — shown when login fails */
    .flash {
      background: #1a0505;
      border: 1px solid #5a1a1a;
      border-left: 3px solid #e74c3c;
      color: #e74c3c;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 2px;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #444;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .back-link:hover { color: #8B1A1A; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-title">HACK<span>4</span>GOV</div>
      <div class="logo-sub">admin access only</div>
    </div>

    <!--
      get_flashed_messages() → gets any flash() messages set in app.py
      This is how Flask passes one-time messages between routes.
      The loop shows each message if there are any.
    -->
    {% for msg in get_flashed_messages() %}
      <div class="flash">> {{ msg }}</div>
    {% endfor %}

    <!--
      method="POST" → sends form data to the same URL (/admin/login)
      Flask checks request.method to know if it's GET or POST
    -->
    <form method="POST" action="{{ url_for('admin_login') }}">

      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="enter username" autocomplete="off" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••••" required>

      <button type="submit">[ ACCESS PANEL ]</button>
    </form>

    <a href="{{ url_for('index') }}" class="back-link">← back to registration</a>
  </div>

</body>
</html>
